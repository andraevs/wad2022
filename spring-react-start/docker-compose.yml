services:
  mariadb:
    image: mariadb:latest
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ecommerce
    networks:
      - spring1
    volumes:
      - mysqlvol:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -proot || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
  app:
    image: spring-boot-docker
    ports:
      - "8080:8080"
    build: .
    networks:
      - spring1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/ecommerce
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mariadb:
        condition: service_healthy
volumes:
  mysqlvol: {}
networks:
  spring1: {}
